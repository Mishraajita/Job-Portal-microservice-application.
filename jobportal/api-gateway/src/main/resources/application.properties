server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Disable gateway's own MVC resource handler so Path=/ route proxies correctly
spring.web.resources.add-mappings=false

# Send X-Forwarded-Host/Port/Proto headers to backend services so their redirects
# resolve back to the gateway port (8080) instead of the internal service port
spring.cloud.gateway.server.webmvc.x-forwarded.enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded.host-enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded.port-enabled=true
spring.cloud.gateway.server.webmvc.x-forwarded.proto-enabled=true

# JWT secret — must match exactly what user-service uses
jwt.secret=jobportal-secret-key-must-be-at-least-32-chars!

# API Gateway is a pure proxy - no security, no session management

# REST API routes
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-api
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=job-service-api
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/jobs/**

spring.cloud.gateway.server.webmvc.routes[2].id=recruiter-service-api
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://RECRUITER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/recruiters/**

spring.cloud.gateway.server.webmvc.routes[3].id=jobseeker-service-api
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://JOBSEEKER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/jobseekers/**

spring.cloud.gateway.server.webmvc.routes[4].id=application-service-api
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/applications/**

spring.cloud.gateway.server.webmvc.routes[5].id=saved-jobs-service-api
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://SAVED-JOBS-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/saved-jobs/**

# UI routes
spring.cloud.gateway.server.webmvc.routes[6].id=user-service-login
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/login,/logout,/register,/register/**

spring.cloud.gateway.server.webmvc.routes[7].id=job-service-dashboard
spring.cloud.gateway.server.webmvc.routes[7].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/,/dashboard,/dashboard/,/dashboard/**

spring.cloud.gateway.server.webmvc.routes[8].id=job-service-search
spring.cloud.gateway.server.webmvc.routes[8].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webmvc.routes[8].predicates[0]=Path=/global-search,/global-search/**

spring.cloud.gateway.server.webmvc.routes[9].id=recruiter-service-ui
spring.cloud.gateway.server.webmvc.routes[9].uri=lb://RECRUITER-SERVICE
spring.cloud.gateway.server.webmvc.routes[9].predicates[0]=Path=/recruiter-profile/**

spring.cloud.gateway.server.webmvc.routes[10].id=jobseeker-service-ui
spring.cloud.gateway.server.webmvc.routes[10].uri=lb://JOBSEEKER-SERVICE
spring.cloud.gateway.server.webmvc.routes[10].predicates[0]=Path=/job-seeker-profile/**

spring.cloud.gateway.server.webmvc.routes[11].id=application-service-ui
spring.cloud.gateway.server.webmvc.routes[11].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[11].predicates[0]=Path=/job-details-apply/**,/job-details/apply/**

spring.cloud.gateway.server.webmvc.routes[22].id=saved-jobs-service-save
spring.cloud.gateway.server.webmvc.routes[22].uri=lb://SAVED-JOBS-SERVICE
spring.cloud.gateway.server.webmvc.routes[22].predicates[0]=Path=/job-details/save/**

spring.cloud.gateway.server.webmvc.routes[12].id=saved-jobs-service-ui
spring.cloud.gateway.server.webmvc.routes[12].uri=lb://SAVED-JOBS-SERVICE
spring.cloud.gateway.server.webmvc.routes[12].predicates[0]=Path=/saved-jobs/**

spring.cloud.gateway.server.webmvc.routes[13].id=static-assets
spring.cloud.gateway.server.webmvc.routes[13].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webmvc.routes[13].predicates[0]=Path=/webjars/**,/css/**,/js/**,/assets/**,/fonts/**,/summernote/**

# Profile photo routes - proxied to the owning service which serves them via MvcConfig
spring.cloud.gateway.server.webmvc.routes[20].id=recruiter-photos
spring.cloud.gateway.server.webmvc.routes[20].uri=lb://RECRUITER-SERVICE
spring.cloud.gateway.server.webmvc.routes[20].predicates[0]=Path=/photos/recruiter/**

spring.cloud.gateway.server.webmvc.routes[21].id=candidate-photos
spring.cloud.gateway.server.webmvc.routes[21].uri=lb://JOBSEEKER-SERVICE
spring.cloud.gateway.server.webmvc.routes[21].predicates[0]=Path=/photos/candidate/**

# H2 Console routes - direct URIs (bypasses Eureka, avoids resolution timing issues)
# H2 console servlet registers at /path/* so always access with trailing slash e.g. /h2-users/
spring.cloud.gateway.server.webmvc.routes[14].id=h2-user-service
spring.cloud.gateway.server.webmvc.routes[14].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[14].predicates[0]=Path=/h2-users/**

spring.cloud.gateway.server.webmvc.routes[15].id=h2-recruiter-service
spring.cloud.gateway.server.webmvc.routes[15].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[15].predicates[0]=Path=/h2-recruiter/**

spring.cloud.gateway.server.webmvc.routes[16].id=h2-job-service
spring.cloud.gateway.server.webmvc.routes[16].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[16].predicates[0]=Path=/h2-jobs/**

spring.cloud.gateway.server.webmvc.routes[17].id=h2-jobseeker-service
spring.cloud.gateway.server.webmvc.routes[17].uri=http://localhost:8084
spring.cloud.gateway.server.webmvc.routes[17].predicates[0]=Path=/h2-jobseeker/**

spring.cloud.gateway.server.webmvc.routes[18].id=h2-application-service
spring.cloud.gateway.server.webmvc.routes[18].uri=http://localhost:8085
spring.cloud.gateway.server.webmvc.routes[18].predicates[0]=Path=/h2-applications/**

spring.cloud.gateway.server.webmvc.routes[19].id=h2-saved-jobs-service
spring.cloud.gateway.server.webmvc.routes[19].uri=http://localhost:8086
spring.cloud.gateway.server.webmvc.routes[19].predicates[0]=Path=/h2-saved-jobs/**

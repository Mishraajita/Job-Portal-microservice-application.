server.port=8086
spring.application.name=SAVED-JOBS-SERVICE
server.forward-headers-strategy=framework

# --- MySQL (active) ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_savedjobs
spring.datasource.username=jobportal
spring.datasource.password=jobportal
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/


# --- H2 (uncomment to switch back to H2 in-memory dev mode, comment out MySQL above) ---
#spring.datasource.url=jdbc:h2:mem:db_savedjobs;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

server.port=8081
spring.application.name=USER-SERVICE
server.forward-headers-strategy=framework

# --- MySQL (active) ---
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/db_users
spring.datasource.username=jobportal
spring.datasource.password=jobportal
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT — must be at least 32 characters (256-bit key for HS256)
jwt.secret=jobportal-secret-key-must-be-at-least-32-chars!
jwt.expiration-ms=86400000

# --- H2 (uncomment to switch back to H2 in-memory dev mode, comment out MySQL above) ---
#spring.datasource.url=jdbc:h2:mem:db_users;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-users
#spring.h2.console.settings.web-allow-others=true

# Feign - timeouts
spring.cloud.openfeign.client.config.default.connect-timeout=3000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# Feign - Resilience4j circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=true
resilience4j.circuitbreaker.instances.default.sliding-window-size=5
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.default.max-attempts=3
resilience4j.retry.instances.default.wait-duration=1s
